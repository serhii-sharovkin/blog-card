<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична № 3</title>
    <style>
      @font-face {
        font-display: swap;
        font-family: "Figtree ExtraBold";
        font-style: normal;
        font-weight: 800;
        src: url("assets/fonts/figtree-extrabold.ttf");
      }
      @font-face {
        font-display: swap;
        font-family: "Figtree Medium";
        font-style: normal;
        font-weight: 500;
        src: url("assets/fonts/figtree-medium.ttf");
      }
      body {
        align-items: center;
        background-color: hsl(40, 98%, 82%);
        display: flex;
        font-size: 16px;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }
      .bold {
        font-family: "Figtree ExtraBold", Helvetica, sans-serif;
        font-weight: 800;
      }
      .card {
        align-items: flex-start;
        background-color: hsl(0, 0%, 100%);
        border: 1px solid hsl(0, 0%, 7%);
        border-radius: 15px;
        box-shadow: 5px 5px hsl(0, 0%, 7%);
        color: hsl(0, 0%, 7%);
        display: flex;
        flex-direction: column;
        font-family: "Figtree Medium", Helvetica, sans-serif;
        font-weight: 500;
        height: auto;
        max-width: 350px;
        padding: 20px;
      }
      .card:hover .card-title {
        color: hsl(40, 98%, 82%);
      }
      .card-author {
        align-items: center;
        display: flex;
        flex-direction: row;
        font-family: "Figtree ExtraBold", Helvetica, sans-serif;
        font-weight: 800;
      }
      .card-avatar {
        height: 32px;
        margin-right: 15px;
        width: 32px;
      }
      .card-category {
        background-color: hsl(40, 98%, 82%);
        border-radius: 5px;
        font-family: "Figtree ExtraBold", Helvetica, sans-serif;
        font-weight: 800;
        margin-bottom: 15px;
        padding: 10px;
      }
      .card-image {
        background-image: url("assets/images/blog-image.png");
        background-size: cover;
        border-radius: 10px;
        height: 200px;
        margin-bottom: 15px;
        width: 100%;
      }
      .card-text {
        color: hsl(0, 0%, 42%);
        margin-bottom: 10px;
      }
      .card-title {
        font-family: "Figtree ExtraBold", Helvetica, sans-serif;
        font-weight: 800;
        margin-bottom: -10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-image"></div>
      <div class="card-category">
        <small>HTML & CSS</small>
      </div>
      <div class="card-date">
        <small>Публікація 20 квітня 2026</small>
      </div>
      <div class="card-title">
        <h2>Практична № 3</h2>
      </div>
      <div class="card-text">
        <p>
          Мета практичної роботи полягає в тому, щоб налаштувати середовище розробки
          <span class="bold">VS Code</span>,
          а також реалізувати картку блогу для вдосконалення фундаментальних навичок з
          <span class="bold">HTML</span>
          та
          <span class="bold">CSS</span>.
        </p>
      </div>
      <div class="card-author">
        <img class="card-avatar" src="assets/images/avatar-male.png">
        <small>Сергій Шаровкін</small>
      </div>
    </div>
  </body>
</html>
